<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeRacer — Aprende Python</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a120a;--bg2:#0f1e0f;--bg3:#142014;--bg4:#1a2e1a;
  --border:#1e381e;--border2:#2d5a2d;
  --green:#4a9e4a;--green2:#85e89d;--green3:#a8f0a0;
  --text:#8ace8a;--text2:#c8f0c8;--text3:#4a7a4a;
  --blue:#79b8ff;--amber:#f4a261;--amber2:#ffd166;
  --red:#f09090;--red2:#cc4444;--purple:#c9a0ff;
  --mono:'Courier New',monospace;
}
html,body{height:100%;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
 
/* ── NAV ── */
#nav{display:flex;align-items:center;background:#060e06;border-bottom:1px solid var(--border);flex-shrink:0;height:38px;}
.nb{padding:0 13px;height:100%;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;white-space:nowrap;}
.nb:hover{color:var(--text);}
.nb.on{color:var(--green3);border-bottom-color:var(--green);}
.nsp{flex:1;}
.hud{display:flex;align-items:center;gap:6px;padding:0 10px;font-size:12px;}
.hsep{width:1px;height:12px;background:var(--border);}
.hlv{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:2px 8px;font-size:11px;font-weight:600;color:var(--green3);}
 
/* ── SCREENS ── */
.scr{display:none;flex:1;overflow-y:auto;overflow-x:hidden;}
.scr.on{display:block;}
.si{padding:12px;}
.sec{font-size:13px;font-weight:600;color:var(--green);margin-bottom:8px;}
 
/* ── GARAGE ── */
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.cc{background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;padding:8px;cursor:pointer;text-align:center;transition:border-color .15s;}
.cc:hover:not(.lk){border-color:var(--border2);}
.cc.sel{border-color:var(--green);background:var(--bg3);}
.cc.lk{opacity:.4;cursor:default;}
.cnm{font-size:11px;font-weight:600;color:var(--text2);margin:3px 0 1px;}
.cs{font-size:9px;color:var(--text3);}
.mb{height:3px;background:var(--bg);border-radius:2px;margin:2px 0;overflow:hidden;}
.mf{height:100%;border-radius:2px;}
.lt{font-size:9px;color:var(--text3);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1px 6px;margin-top:2px;display:inline-block;}
.kgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px;}
.kc{background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;transition:border-color .15s;}
.kc:hover{border-color:var(--border2);}
.kc.done{border-color:var(--green);}
.knum{font-size:9px;color:var(--text3);margin-bottom:1px;}
.knm{font-size:11px;font-weight:600;margin-bottom:1px;}
.kco{font-size:10px;color:var(--text3);}
.kbd{display:inline-block;font-size:9px;border-radius:8px;padding:1px 6px;margin-top:2px;}
.bd-ok{background:#1a4a1a;color:var(--green2);border:1px solid var(--green);}
.bd-no{background:var(--bg);color:var(--text3);border:1px solid var(--border);}
.bgo{display:block;width:100%;padding:10px;background:var(--bg3);border:1.5px solid var(--green);border-radius:9px;color:var(--green3);font-size:13px;font-weight:600;cursor:pointer;}
.bgo:hover{background:var(--bg4);}
 
/* ── RACE SCREEN (layout fixo) ── */
#scr-race{display:none;flex-direction:column;height:calc(100vh - 38px);overflow:hidden;}
#scr-race.on{display:flex;}
 
/* Pista: altura fija, não cresce */
#track-area{position:relative;flex-shrink:0;height:220px;background:#1c3a1c;overflow:hidden;}
#rc{display:block;position:absolute;top:0;left:0;}
 
/* HUD linha */
#rhud{display:flex;align-items:center;gap:6px;padding:4px 10px;background:#060e06;border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;font-size:11px;}
.ri{display:flex;align-items:center;gap:3px;}
.rl{color:var(--text3);}.rv{font-weight:600;color:var(--text2);}
.rsep{width:1px;height:11px;background:var(--border);}
 
/* Barra progresso */
#pgrow{display:flex;align-items:center;gap:6px;padding:3px 10px;background:var(--bg);flex-shrink:0;}
.pgo{flex:1;height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.pgi{height:100%;background:var(--green);border-radius:3px;transition:width .3s;}
 
/* Painel exercício/cartel — área rolável */
#panel-area{flex:1;overflow-y:auto;min-height:0;}
 
#bb-panel,#ex-panel{display:none;padding:10px 12px;border-top:2px solid;}
#bb-panel{border-color:var(--green);background:var(--bg2);}
#ex-panel{border-color:var(--amber);background:var(--bg2);}
#bb-panel.vis,#ex-panel.vis{display:block;}
.ovhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.ovt{font-size:13px;font-weight:600;color:var(--text2);}
.ovcont{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:3px 12px;font-size:11px;color:var(--green2);cursor:pointer;}
.ovgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ovth{font-size:12px;color:var(--text);line-height:1.6;}
.ovth b{color:var(--text2);}
.ovth ul{padding-left:14px;margin-top:3px;}
.ovth li{margin-bottom:2px;}
.cbox{background:#040a04;border:1px solid var(--border);border-radius:7px;padding:8px;font-family:var(--mono);font-size:11px;color:var(--text);line-height:1.7;}
.kw{color:var(--blue);}.st{color:var(--green2);}.nm{color:var(--amber);}.cm{color:var(--text3);}.fn{color:var(--purple);}
.exq{font-size:13px;font-weight:600;color:#f4e0b0;margin-bottom:4px;line-height:1.4;}
.exht{font-size:11px;color:#8a6040;margin-bottom:6px;}
.opts{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.opt{background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:4px 12px;font-size:12px;color:var(--text);cursor:pointer;font-family:var(--mono);}
.opt:hover{border-color:var(--border2);}
.opt.sel{border-color:var(--green);color:var(--green3);}
.opt.cor{background:#1a4a1a;border-color:var(--green);color:var(--green3);}
.opt.wrg{background:#2a1010;border-color:var(--red2);color:var(--red);}
.fb{font-size:12px;border-radius:7px;padding:6px 10px;margin-top:5px;display:none;line-height:1.4;}
.fb.ok{display:block;background:#1a4a1a;border:1px solid var(--green);color:var(--green3);}
.fb.err{display:block;background:#2a1010;border:1px solid #7a3a3a;color:var(--red);}
.exbtns{display:flex;gap:6px;margin-top:5px;}
.bver{background:var(--bg3);border:1.5px solid var(--green);border-radius:7px;padding:5px 16px;font-size:12px;font-weight:600;color:var(--green3);cursor:pointer;}
.bver:hover{background:var(--bg4);}
.bsk{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:5px 11px;font-size:11px;color:var(--text3);cursor:pointer;}
 
/* "Pressione iniciar" overlay */
#start-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.5);z-index:10;}
#start-overlay button{background:var(--bg3);border:2px solid var(--green);border-radius:12px;padding:12px 30px;font-size:15px;font-weight:700;color:var(--green3);cursor:pointer;}
 
/* ── EDITOR ── */
.mgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:9px;}
.mc{background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;}
.mc:hover{border-color:var(--border2);}
.mc.am{border-color:var(--green);}
.mn_{font-size:9px;color:var(--text3);margin-bottom:2px;}
.mt_{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:1px;}
.md_{font-size:10px;color:var(--text3);line-height:1.3;}
.mx_{font-size:9px;margin-top:3px;}
.ewrap{display:grid;grid-template-columns:1fr 1fr;gap:8px;height:240px;}
.ep{background:#040a04;border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;}
.ephd{display:flex;align-items:center;gap:5px;padding:4px 8px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:11px;color:var(--text3);flex-shrink:0;}
.d3{display:flex;gap:3px;}.dot{width:7px;height:7px;border-radius:50%;}
textarea#cta{flex:1;width:100%;background:#040a04;border:none;outline:none;resize:none;font-family:var(--mono);font-size:12px;color:var(--green2);padding:8px;line-height:1.65;caret-color:var(--green3);}
#obox{padding:8px;font-family:var(--mono);font-size:11px;color:var(--text);line-height:1.65;flex:1;white-space:pre-wrap;word-break:break-all;overflow-y:auto;}
#obox.err{color:var(--red);}
.ebtns{display:flex;gap:6px;margin-top:8px;align-items:center;flex-wrap:wrap;}
#hintbox{margin-top:7px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:7px;font-size:12px;display:none;}
 
/* ── RANKING ── */
.rwrap{overflow-x:auto;}
table.rt{width:100%;border-collapse:collapse;}
.rt th{font-size:10px;color:var(--text3);font-weight:500;padding:5px 8px;text-align:left;border-bottom:1px solid var(--border);}
.rt td{font-size:12px;padding:5px 8px;border-bottom:1px solid var(--bg3);color:var(--text);}
.rt tr.me td{color:var(--green3);background:var(--bg3);}
.rxp{color:var(--amber2);font-weight:600;}.rlv{color:var(--blue);}.rst{color:var(--amber);}
.dg{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px;}
.dc{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px;}
.dt_{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:1px;}
.dd_{font-size:10px;color:var(--text3);margin-bottom:4px;line-height:1.3;}
.dpb{height:3px;background:var(--bg);border-radius:2px;margin-bottom:3px;overflow:hidden;}
.dpf{height:100%;border-radius:2px;}
.dx_{font-size:10px;color:var(--amber);}
 
/* ── LOGROS ── */
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:11px;text-align:center;}
.tc.earned{border-color:var(--amber);}
.tc.lkt .tic{filter:grayscale(1);opacity:.3;}
.tic{font-size:24px;margin-bottom:4px;}
.tnm{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:2px;}
.tds{font-size:10px;color:var(--text3);}
 
/* ── MODAL ── */
#mwrap{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;}
#mwrap.open{display:flex;}
#modal{background:var(--bg2);border:1.5px solid var(--green);border-radius:13px;padding:20px;max-width:420px;width:90%;text-align:center;}
#modal h2{font-size:18px;color:var(--text2);margin-bottom:6px;}
#modal p{font-size:13px;color:var(--text);margin-bottom:13px;line-height:1.5;}
.mic{font-size:34px;margin-bottom:9px;}
</style>
</head>
<body>
<div id="app">
 
<!-- NAV -->
<div id="nav">
  <button class="nb on" onclick="go('garage')">🏠 Garaje</button>
  <button class="nb" onclick="go('race')">🏁 Carrera</button>
  <button class="nb" onclick="go('editor')">💻 Editor</button>
  <button class="nb" onclick="go('ranking')">🏆 Ranking</button>
  <button class="nb" onclick="go('trophy')">🎖️ Logros</button>
  <div class="nsp"></div>
  <div class="hud">
    <span class="hlv" id="hlv">Nv 1</span>
    <div class="hsep"></div>
    <span style="color:var(--text3);font-size:10px">XP</span>
    <span style="color:var(--amber2);font-weight:600;font-size:12px" id="hxp">0</span>
    <div class="hsep"></div>
    <span style="color:var(--amber);font-size:11px" id="hco">🪙0</span>
    <div class="hsep"></div>
    <span style="color:var(--amber);font-size:11px" id="hst">🔥0d</span>
  </div>
</div>
 
<!-- GARAJE -->
<div class="scr on" id="scr-garage">
<div class="si">
  <div class="sec">🚗 Mi garaje — elige tu auto</div>
  <div class="cgrid" id="car-grid"></div>
  <div class="sec">🗺️ Circuitos</div>
  <div class="kgrid" id="circ-grid"></div>
  <button class="bgo" onclick="go('race');startRace()">▶ Iniciar carrera</button>
</div>
</div>
 
<!-- CARRERA -->
<div class="scr" id="scr-race">
  <!-- PISTA FIJA 220px -->
  <div id="track-area">
    <canvas id="rc"></canvas>
    <div id="start-overlay">
      <button onclick="hideOverlay();startRace()">🏎️ ¡Arrancar!</button>
    </div>
  </div>
 
  <!-- HUD -->
  <div id="rhud">
    <div class="ri"><span class="rl">Circuito</span><span class="rv" id="rci">—</span></div>
    <div class="rsep"></div>
    <div class="ri"><span class="rl">Pos</span><span class="rv" id="rpo">—</span></div>
    <div class="rsep"></div>
    <div class="ri"><span class="rl">Vuelta</span><span class="rv" id="rlp">1/3</span></div>
    <div class="rsep"></div>
    <div class="ri"><span class="rv" style="color:var(--amber2)" id="rsp">—</span></div>
    <div class="rsep"></div>
    <div class="ri" id="rst" style="color:var(--green)">Listo</div>
    <div class="nsp"></div>
    <button onclick="stopRace();go('garage')" style="background:#1a0808;border:1px solid #5a1a1a;border-radius:5px;padding:2px 9px;font-size:11px;color:#cc6060;cursor:pointer;">Salir</button>
  </div>
 
  <!-- PROGRESO -->
  <div id="pgrow">
    <span style="font-size:10px;color:var(--text3);min-width:50px" id="pgpct">0%</span>
    <div class="pgo"><div class="pgi" id="pgin" style="width:0%"></div></div>
    <span style="font-size:10px;color:var(--text3);min-width:100px;text-align:right" id="pgnx">—</span>
  </div>
 
  <!-- PANELES (ejercicios / carteles) -->
  <div id="panel-area">
    <div id="bb-panel">
      <div class="ovhd">
        <div class="ovt">📋 <span id="bbti">—</span></div>
        <button class="ovcont" onclick="closeOv()">▶ Continuar carrera</button>
      </div>
      <div class="ovgrid">
        <div class="ovth" id="bbth"></div>
        <div class="cbox" id="bbco"></div>
      </div>
    </div>
    <div id="ex-panel">
      <div class="ovhd">
        <div class="ovt" style="color:var(--amber)">⚡ <span id="exti">—</span></div>
        <button class="bsk" onclick="skipEx()">Saltar (−10 XP)</button>
      </div>
      <div class="exq" id="exq"></div>
      <div class="exht" id="exht"></div>
      <div class="cbox" id="exco" style="margin-bottom:6px;font-size:11px;"></div>
      <div class="opts" id="exopts"></div>
      <div class="exbtns">
        <button class="bver" onclick="checkAns()">✓ Verificar</button>
        <button class="bsk" onclick="skipEx()">Continuar sin resolver</button>
      </div>
      <div class="fb" id="fbok"></div>
      <div class="fb" id="fberr"></div>
    </div>
  </div>
</div>
 
<!-- EDITOR -->
<div class="scr" id="scr-editor">
<div class="si">
  <div class="sec">💻 Misiones de código Python</div>
  <div class="mgrid" id="mis-grid"></div>
  <div class="ewrap">
    <div class="ep">
      <div class="ephd">
        <div class="d3"><div class="dot" style="background:#cc4444"></div><div class="dot" style="background:var(--amber)"></div><div class="dot" style="background:var(--green)"></div></div>
        <span>mi_codigo.py</span><span style="margin-left:auto;font-size:10px" id="edlbl">—</span>
      </div>
      <textarea id="cta" spellcheck="false"></textarea>
    </div>
    <div class="ep">
      <div class="ephd"><span>▶ Salida</span><span style="margin-left:auto;font-size:10px" id="edst"></span></div>
      <div id="obox">Presiona Ejecutar...</div>
    </div>
  </div>
  <div class="ebtns">
    <button class="bver" onclick="runCode()">▶ Ejecutar</button>
    <button class="bsk" onclick="clearEd()">Limpiar</button>
    <button class="bsk" onclick="showHint()">💡 Pista</button>
  </div>
  <div id="hintbox"></div>
</div>
</div>
 
<!-- RANKING -->
<div class="scr" id="scr-ranking">
<div class="si">
  <div class="sec">🏆 Ranking del curso</div>
  <div class="rwrap"><table class="rt"><thead><tr><th>Pos</th><th>Piloto</th><th>XP</th><th>Nv</th><th>Victorias</th><th>Racha</th></tr></thead><tbody id="rbody"></tbody></table></div>
  <div class="sec" style="margin-top:12px">📅 Misiones del día</div>
  <div class="dg" id="dg"></div>
</div>
</div>
 
<!-- LOGROS -->
<div class="scr" id="scr-trophy">
<div class="si">
  <div class="sec">🎖️ Mis logros</div>
  <div class="tg" id="tg"></div>
</div>
</div>
 
</div><!-- fin app -->
 
<!-- MODAL -->
<div id="mwrap">
<div id="modal">
  <div class="mic" id="mic">🏆</div>
  <h2 id="mti">—</h2>
  <p id="mms">—</p>
  <button class="bver" onclick="closeMod()">¡Continuar!</button>
</div>
</div>
 
<script>
// ═══════════════════════ DATOS ═══════════════════════
const CARS=[
  {id:0,nm:'Turbo Python',col:'#5bc8f5',acc:'#a8e8ff',spd:6,ac:6,lk:false,xr:0,ds:'Auto de inicio'},
  {id:1,nm:'Shadow GT',col:'#cc4444',acc:'#f09090',spd:7,ac:7,lk:true,xr:300,ds:'Motor agresivo'},
  {id:2,nm:'Rocket R1',col:'#ffd166',acc:'#fff0a0',spd:8,ac:8,lk:true,xr:800,ds:'Pura velocidad'},
  {id:3,nm:'Ghost 404',col:'#c9a0ff',acc:'#e8d8ff',spd:9,ac:8,lk:true,xr:1800,ds:'Auto misterioso'},
  {id:4,nm:'ByteBreaker',col:'#f4a261',acc:'#ffe0c0',spd:9,ac:9,lk:true,xr:3500,ds:'Ex-auto del villano'},
  {id:5,nm:'Code Legend',col:'#85e89d',acc:'#c8f8d0',spd:10,ac:10,lk:true,xr:6000,ds:'Solo para campeones'},
];
const CIRCS=[
  {nm:'Pista de Combustible',co:'Variables & tipos',cl:'#79b8ff'},
  {nm:'Curvas de Decisión',co:'Condicionales if/elif/else',cl:'#85e89d'},
  {nm:'Vueltas Infinitas',co:'Bucles for & while',cl:'#c9a0ff'},
  {nm:'Motor Turbo',co:'Funciones & parámetros',cl:'#f4a261'},
  {nm:'El Garaje',co:'Listas & métodos',cl:'#f78fb3'},
  {nm:'Stats del Corredor',co:'Diccionarios',cl:'#5dcaa5'},
  {nm:'Taller de Reparación',co:'Try / Except',cl:'#ffd166'},
  {nm:'Gran Premio Final',co:'Proyecto integrado',cl:'#e0a0ff'},
];
const BB=[
  [{t:'Variables — cajones de datos',th:'<b>Una variable</b> guarda información con un nombre.<br><br><b>Tipos principales:</b><ul><li><b>int</b> — enteros: velocidad = 120</li><li><b>float</b> — decimales: 99.5</li><li><b>str</b> — texto: "Turbo Py"</li><li><b>bool</b> — True / False</li></ul>',co:'<span class="cm"># Tu auto</span>\nvelocidad = <span class="nm">120</span>\ncombustible = <span class="nm">99.5</span>\nnombre = <span class="st">"Turbo Python"</span>\nactivo = <span class="kw">True</span>\n<span class="kw">print</span>(nombre, velocidad)'},

const SK='cr2';
let S={xp:0,coins:0,lv:1,streak:0,lastDay:'',sc:0,sci:0,
       cars:[true,false,false,false,false,false],
       circs:[false,false,false,false,false,false,false,false],
       ed:[false,false,false,false,false,false,false,false],
       tr:[],wins:0,exok:0,
       daily:{ex:0,op:0,rc:0,day:''}};
function sv(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
function ld(){
  try{const d=localStorage.getItem(SK);if(d)S=Object.assign(S,JSON.parse(d));}catch(e){}
  const td=new Date().toDateString();
  if(S.lastDay!==td){
    S.streak=S.lastDay?Math.round((new Date(td)-new Date(S.lastDay))/86400000)===1?S.streak+1:1:1;
    S.lastDay=td;
  }
  if(S.daily.day!==td)S.daily={ex:0,op:1,rc:0,day:td};
  else S.daily.op=1;
  sv();updH();
}
function updH(){
  document.getElementById('hxp').textContent=S.xp.toLocaleString();
  document.getElementById('hco').textContent='🪙'+S.coins;
  document.getElementById('hlv').textContent='Nv '+S.lv;
  document.getElementById('hst').textContent='🔥'+S.streak+'d';
}
function addXP(n,silent){
  S.xp+=n;S.coins+=Math.max(0,Math.floor(n/5));
  const nl=Math.floor(S.xp/400)+1,lv=nl>S.lv;S.lv=nl;
  CARS.forEach((c,i)=>{if(!S.cars[i]&&S.xp>=c.xr)S.cars[i]=true;});
  updH();sv();if(lv&&!silent)mod('⬆️','¡Subiste de nivel!','Ahora eres Nivel '+S.lv+'.');
  chkTr();
}

function go(nm){
  document.querySelectorAll('.scr').forEach(s=>{s.classList.remove('on');s.style.display='none';});
  const el=document.getElementById('scr-'+nm);
  if(!el)return;
  if(nm==='race'){el.style.display='flex';el.classList.add('on');}
  else{el.style.display='block';el.classList.add('on');}
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  ['garage','race','editor','ranking','trophy'].forEach((n,i)=>{if(n===nm)document.querySelectorAll('.nb')[i].classList.add('on');});
  if(nm==='garage')bldGar();
  if(nm==='editor'){bldMis();ldMis(curM);}
  if(nm==='ranking')bldRnk();
  if(nm==='trophy')bldTr();
}

function bldGar(){
  const g=document.getElementById('car-grid');g.innerHTML='';
  CARS.forEach((car,i)=>{
    const un=S.cars[i];
    const d=document.createElement('div');
    d.className='cc'+(i===S.sc?' sel':'')+(un?'':' lk');
    const cv=document.createElement('canvas');cv.width=100;cv.height=44;
    d.appendChild(cv);
    d.innerHTML+=`<div class="cnm">${car.nm}</div><div class="cs">${car.ds}</div>`;

    d.innerHTML+=`<div style="font-size:9px;color:var(--text3)">Ac</div><div class="mb"><div class="mf" style="width:${car.ac*10}%;background:var(--green)"></div></div>`;
    if(!un)d.innerHTML+=`<span class="lt">🔒${car.xr.toLocaleString()} XP</span>`;
    if(un)d.onclick=()=>{S.sc=i;sv();bldGar();};
    g.appendChild(d);drwCV(cv,car,un);
  });
  const cg=document.getElementById('circ-grid');cg.innerHTML='';
  CIRCS.forEach((c,i)=>{

    d.onclick=()=>{S.sci=i;sv();bldGar();go('race');startRace();};
    cg.appendChild(d);

}
function drwCV(cv,car,un){
  const ctx=cv.getContext('2d'),W=100,H=44,cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=car.col;ctx.beginPath();ctx.roundRect(cx-22,cy-8,44,16,5);ctx.fill();
  ctx.fillStyle=car.acc;ctx.beginPath();ctx.roundRect(cx-13,cy-13,26,11,3);ctx.fill();
  ctx.fillStyle='#1a1a2a';
  [[-13,9],[11,9]].forEach(([wx,wy])=>{ctx.beginPath();ctx.ellipse(cx+wx,cy+wy,5,3.5,0,0,Math.PI*2);ctx.fill();});
  if(!un){ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🔒',cx,cy);}
}
 
// ═══════════════ CANVAS RACE ═══════════════
// Pista pequeña — cabe en 220px de alto, todo visible
const CW=680, CH=210;
 
// Track points ajustados para CH=210
const TP=[
  {x:70,y:175},{x:160,y:175},{x:250,y:175},{x:340,y:175},{x:430,y:175},
  {x:510,y:175},{x:560,y:155},{x:590,y:125},{x:590,y:90},
  {x:565,y:62},{x:520,y:48},{x:460,y:44},{x:400,y:44},
  {x:340,y:44},{x:280,y:44},{x:220,y:44},
  {x:160,y:48},{x:115,y:62},{x:88,y:90},
  {x:82,y:125},{x:88,y:155},{x:70,y:175}
];
 
function tPos(t){
  const raw=((t%1)+1)%1;
  const fi=raw*(TP.length-1);
  const i=Math.floor(fi)%(TP.length-1);
  const f=fi-Math.floor(fi);
  const a=TP[i],b=TP[i+1]||TP[0];
  return{x:a.x+(b.x-a.x)*f,y:a.y+(b.y-a.y)*f};
}
function tAng(t){
  const p1=tPos(t),p2=tPos(t+0.004);
  return Math.atan2(p2.y-p1.y,p2.x-p1.x);
}
 
let cv,ctx2;
let raf=null,rActive=false;
let pT=0,b1T=0.18,b2T=0.34,pSpd=0;
let trig=new Set(),cps=[];
let selO=null,curExId=0;
let lastTs=0;
 
function buildCPs(){
  return[
    {t:.10,lbl:'Cartel 1',type:'bb',id:0,col:'#79b8ff'},
    {t:.30,lbl:'Ejercicio 1',type:'ex',id:0,col:'#f4a261'},
    {t:.52,lbl:'Cartel 2',type:'bb',id:1,col:'#85e89d'},
    {t:.72,lbl:'Ejercicio 2',type:'ex',id:1,col:'#f4a261'},
    {t:.88,lbl:'Bonus +30XP',type:'bonus',id:0,col:'#ffd166'},
  ];
}
 
function initCV(){
  cv=document.getElementById('rc');
  cv.width=CW;cv.height=CH;
  cv.style.width='100%';cv.style.height=CH+'px';
  document.getElementById('track-area').style.height=CH+'px';
  ctx2=cv.getContext('2d');
  cv.onclick=function(e){
    const r=cv.getBoundingClientRect(),sx=CW/r.width,sy=CH/r.height;
    const mx=(e.clientX-r.left)*sx,my=(e.clientY-r.top)*sy;
    cps.forEach(cp=>{
      const p=tPos(cp.t);
      if(Math.hypot(mx-p.x,my-p.y)<18){
        if(cp.type==='bb')openBB(cp.id);
        else if(cp.type==='ex')openEx(cp.id);
      }
    });
  };
}
 
function hideOverlay(){document.getElementById('start-overlay').style.display='none';}
 
function startRace(){
  if(!cv)initCV();
  stopRace();
  const car=CARS[S.sc];
  cps=buildCPs();
  pT=0;b1T=0.17;b2T=0.35;
  pSpd=0.0022+car.spd*0.00016;
  trig=new Set();rActive=true;selO=null;
  closeOvs();
  document.getElementById('rci').textContent=CIRCS[S.sci].nm;
  document.getElementById('rlp').textContent='1/3';
  document.getElementById('rst').textContent='En carrera';
  document.getElementById('rst').style.color='var(--green)';
  document.getElementById('pgnx').textContent='Siguiente: Cartel 1';
  document.getElementById('start-overlay').style.display='none';
  lastTs=0;
  raf=requestAnimationFrame(tick);
}
function stopRace(){rActive=false;if(raf){cancelAnimationFrame(raf);raf=null;}}
 
function tick(ts){
  const dt=lastTs?Math.min(ts-lastTs,50):16.67;
  lastTs=ts;
  if(rActive){
    const ps=pSpd*(dt/16.67);
    pT=(pT+ps)%1;
    b1T=(b1T+ps*0.90)%1;
    b2T=(b2T+ps*0.82)%1;
 
    const pct=Math.round(pT*100);
    document.getElementById('pgin').style.width=pct+'%';
    document.getElementById('pgpct').textContent=pct+'%';
    const spd=Math.round(70+CARS[S.sc].spd*13+Math.sin(pT*18)*4);
    document.getElementById('rsp').textContent=spd+' km/h';
    document.getElementById('rpo').textContent=[b1T,b2T].filter(b=>b>pT).length===0?'1°':[b1T,b2T].filter(b=>b>pT).length===1?'2°':'3°';
 
    cps.forEach(cp=>{
      const key=cp.t+''+cp.type;
      if(!trig.has(key)&&Math.abs(pT-cp.t)<0.016){
        trig.add(key);
        if(cp.type==='bb'){rActive=false;openBB(cp.id);}
        else if(cp.type==='ex'){rActive=false;openEx(cp.id);}
        else if(cp.type==='bonus'){addXP(30,true);mod('⭐','¡Bonus!','+30 XP en pista.');}
      }
    });
 
    if(pT>0.97&&!trig.has('lap')){
      trig.add('lap');rActive=false;
      S.circs[S.sci]=true;S.wins++;
      if(S.daily.day===new Date().toDateString())S.daily.rc=1;
      sv();addXP(150);chkTr();
      document.getElementById('rst').textContent='¡Ganaste! 🏆';
      document.getElementById('rst').style.color='var(--amber2)';
      mod('🏆','¡Carrera completada!','Ganaste "'+CIRCS[S.sci].nm+'". +150 XP.');
    }
  }
  draw();
  raf=requestAnimationFrame(tick);
}
 
function draw(){
  if(!ctx2)return;
  const ctx=ctx2,W=CW,H=CH;
  ctx.clearRect(0,0,W,H);
 
  // fondo verde
  ctx.fillStyle='#1c3a1c';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#1e441e';
  for(let i=0;i<80;i++)ctx.fillRect(i*19%W,i*29%(H-10),2,3);
 
  // árboles pequeños
  [[20,30],[660,30],[20,185],[660,185],[340,190],[510,190],[165,190]].forEach(([tx,ty])=>{
    ctx.fillStyle='#0d2a0d';ctx.beginPath();ctx.arc(tx,ty,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a4a1a';ctx.beginPath();ctx.arc(tx-1,ty-2,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5a3820';ctx.fillRect(tx-1,ty+6,3,5);
  });
 
  // bordillos
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.setLineDash([13,13]);ctx.strokeStyle='#cc3333';ctx.lineWidth=44;
  ctx.beginPath();ctx.moveTo(TP[0].x,TP[0].y);TP.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();ctx.stroke();
  ctx.setLineDash([13,13]);ctx.lineDashOffset=13;ctx.strokeStyle='#fff';
  ctx.beginPath();ctx.moveTo(TP[0].x,TP[0].y);TP.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();ctx.stroke();
  ctx.setLineDash([]);ctx.lineDashOffset=0;
 
  // asfalto
  ctx.strokeStyle='#4a5548';ctx.lineWidth=36;
  ctx.beginPath();ctx.moveTo(TP[0].x,TP[0].y);TP.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();ctx.stroke();
 
  // líneas de carril
  ctx.setLineDash([16,16]);ctx.strokeStyle='rgba(240,230,100,.28)';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(TP[0].x,TP[0].y);TP.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();ctx.stroke();
  ctx.setLineDash([]);
 
  // meta
  for(let r=0;r<3;r++)for(let c=0;c<2;c++){ctx.fillStyle=(r+c)%2===0?'#fff':'#111';ctx.fillRect(63+c*4,167+r*4,4,4);}
  ctx.fillStyle='#fff';ctx.font='bold 7px sans-serif';ctx.textAlign='start';ctx.fillText('META',74,168);
 
  // checkpoints
  cps.forEach(cp=>{
    const p=tPos(cp.t);
    ctx.beginPath();ctx.arc(p.x,p.y,13,0,Math.PI*2);
    ctx.fillStyle=cp.type==='bb'?'#0a1a3a':cp.type==='bonus'?'#2a2000':'#2a1000';ctx.fill();
    ctx.strokeStyle=cp.col;ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(cp.type==='bb'?'i':cp.type==='bonus'?'★':'!',p.x,p.y);
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='500 7px sans-serif';ctx.textBaseline='top';
    ctx.fillText(cp.lbl,p.x,p.y+15);
  });
 
  // coches
  drwCar(b2T,'#f4a261','#ffe0c0',false);
  drwCar(b1T,'#cc4444','#f09090',false);
  drwCar(pT,CARS[S.sc].col,CARS[S.sc].acc,true);
}
 
function drwCar(t,col,acc,player){
  const ctx=ctx2,p=tPos(t),ang=tAng(t);
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(ang);
  ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(-11,-6,22,12,4);ctx.fill();
  ctx.fillStyle=acc;ctx.beginPath();ctx.roundRect(-6,-5,12,8,2);ctx.fill();
  ctx.fillStyle='#111';
  [[-7,6],[6,6],[-7,-6],[6,-6]].forEach(([wx,wy])=>{ctx.beginPath();ctx.ellipse(wx,wy,3.5,2.5,0,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle='rgba(255,255,180,.9)';ctx.beginPath();ctx.ellipse(11,3.5,2.5,1.8,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(11,-3.5,2.5,1.8,0,0,Math.PI*2);ctx.fill();
  if(player){ctx.strokeStyle='rgba(168,240,160,.55)';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(-13,-8,26,16,5);ctx.stroke();}
  ctx.restore();
}

function runCode(){
  const code=document.getElementById('cta').value.trim();
  const ob=document.getElementById('obox'),st=document.getElementById('edst');
  const lines=[];
  const fp=(...a)=>lines.push(a.map(x=>typeof x==='object'?JSON.stringify(x):String(x)).join(' '));
  try{
    let js=code;
    js=js.replace(/f"((?:[^"\\]|\\.)*)"/g,(_,t)=>'`'+t.replace(/\{([^}]+)\}/g,'${$1}')+'`');
    js=js.replace(/f'((?:[^'\\]|\\.)*)'/g,(_,t)=>'`'+t.replace(/\{([^}]+)\}/g,'${$1}')+'`');
    js=js.replace(/\bTrue\b/g,'true').replace(/\bFalse\b/g,'false').replace(/\bNone\b/g,'null');
    js=js.replace(/\bprint\s*\(/g,'fp(');
    js=js.replace(/\belif\b/g,'else if');
    js=js.replace(/\band\b/g,'&&').replace(/\bor\b/g,'||').replace(/\bnot\s+/g,'!');
    js=js.replace(/^(\s*)def\s+(\w+)\s*\(([^)]*)\)\s*:/mg,(_,i,n,p)=>`${i}function ${n}(${p}){`);
    js=js.replace(/^(\s*)for\s+(\w+)\s+in\s+range\((\d+)\s*,\s*(\d+)(?:\s*,\s*(\d+))?\)\s*:/mg,(_,i,v,a,b,s)=>`${i}for(let ${v}=${a};${v}<${b};${v}+=${s||1}){`);
    js=js.replace(/^(\s*)for\s+(\w+)\s+in\s+range\((\d+)\)\s*:/mg,(_,i,v,n)=>`${i}for(let ${v}=0;${v}<${n};${v}++){`);
    js=js.replace(/^(\s*)for\s+(\w+)\s*,\s*(\w+)\s+in\s+(\w+)\.items\(\)\s*:/mg,(_,i,k,v,d)=>`${i}for(let [${k},${v}] of Object.entries(${d})){`);
    js=js.replace(/^(\s*)for\s+(\w+)\s+in\s+(\w+)\s*:/mg,(_,i,v,a)=>`${i}for(let ${v} of ${a}){`);
    js=js.replace(/^(\s*)while\s+(.+)\s*:/mg,(_,i,c)=>`${i}while(${c}){`);
    js=js.replace(/^(\s*)if\s+(.+)\s*:/mg,(_,i,c)=>`${i}if(${c}){`);
    js=js.replace(/^(\s*)else\s+if\s+(.+)\s*:/mg,(_,i,c)=>`${i}} else if(${c}){`);
    js=js.replace(/^(\s*)else\s*:/mg,(_,i)=>`${i}} else {`);
    js=js.replace(/^(\s*)try\s*:/mg,(_,i)=>`${i}try{`);
    js=js.replace(/^(\s*)except\s+\w+\s*:/mg,(_,i)=>`${i}} catch(e){`);
    js=js.replace(/^(\s*)except\s*:/mg,(_,i)=>`${i}} catch(e){`);
    js=js.replace(/^(\s*)finally\s*:/mg,(_,i)=>`${i}} finally{`);
    js=js.replace(/\.append\(/g,'.push(');
    js=js.replace(/\blen\((\w+)\)/g,'($1.length)');
    js=js.replace(/\bint\(([^)]+)\)/g,'(parseInt($1,10)||0)');
    js=js.replace(/\bfloat\(([^)]+)\)/g,'parseFloat($1)');
    js=js.replace(/\bstr\(([^)]+)\)/g,'String($1)');
    let dep=0;
    js.split('\n').forEach(l=>{dep+=(l.match(/\{/g)||[]).length-(l.match(/\}/g)||[]).length;});
    for(let i=0;i<Math.max(0,dep);i++)js+='\n}';
    new Function('fp',js)(fp);
    ob.textContent=lines.join('\n')||'(sin salida visible)';ob.className='';
    st.textContent='✓ OK';st.style.color='var(--green)';
    if(lines.length>0&&!S.ed[curM]){
      S.ed[curM]=true;const xp=EMIS[curM].xp;addXP(xp);
      mod('💻','¡Código ejecutado!','Tu código funcionó. +'+xp+' XP');chkTr();bldMis();
    }
  }catch(ex){
    const em={SyntaxError:'Sintaxis — revisa los dos puntos ":" y la indentación.',ReferenceError:'Variable no definida — ¿la declaraste antes de usarla?',TypeError:'Tipo incorrecto — revisa el tipo de dato.'};
    const e=Object.entries(em).find(([k])=>ex.name===k);
    ob.textContent=(e?e[1]:'Error: '+ex.message)+'\n\nRevisa tu código línea por línea.';
    ob.className='err';st.textContent='✗ Error';st.style.color='var(--red)';
  }
}

function chkTr(){
  const earn=id=>{if(!S.tr.includes(id)){S.tr.push(id);sv();const t=TROPH.find(x=>x.id===id);if(t)mod(t.ic,'¡Logro desbloqueado!','"'+t.nm+'" — '+t.ds);}};
  if(S.wins>=1)earn('w1');if(S.exok>=1)earn('e1');
  ['c0','c1','c2','c3','c4','c5','c6','c7'].forEach((id,i)=>{if(S.circs[i])earn(id);});
  if(S.ed.filter(Boolean).length>=5)earn('ed5');
  if(S.streak>=7)earn('s7');
}
function bldTr(){
  const g=document.getElementById('tg');g.innerHTML='';
  TROPH.forEach(t=>{

}
