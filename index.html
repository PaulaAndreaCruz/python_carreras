<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeRacer — Aprende Python</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a120a;--bg2:#0f1e0f;--bg3:#142014;--bg4:#1a2e1a;
  --border:#1e381e;--border2:#2d5a2d;
  --green:#4a9e4a;--green2:#85e89d;--green3:#a8f0a0;
  --text:#8ace8a;--text2:#c8f0c8;--text3:#4a7a4a;
  --blue:#79b8ff;--amber:#f4a261;--amber2:#ffd166;
  --red:#f09090;--red2:#cc4444;--purple:#c9a0ff;
  --font-mono:'Courier New',monospace;
}
html,body{height:100%;font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;}

/* NAV */
#nav{display:flex;align-items:center;background:#060e06;border-bottom:1px solid var(--border);flex-shrink:0;}
.nav-btn{padding:9px 14px;font-size:12px;font-weight:500;color:var(--text3);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;white-space:nowrap;}
.nav-btn:hover{color:var(--text);}
.nav-btn.active{color:var(--green3);border-bottom-color:var(--green);}
.nav-sp{flex:1;}
.hud{display:flex;align-items:center;gap:6px;padding:0 10px;font-size:12px;}
.hud-sep{width:1px;height:12px;background:var(--border);}
.hud-lv{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:2px 9px;font-size:11px;font-weight:600;color:var(--green3);}

/* SCREENS */
.screen{display:none;flex:1;overflow-y:auto;}
.screen.active{display:block;}
.si{padding:12px;}
.sec{font-size:13px;font-weight:600;color:var(--green);margin-bottom:10px;}

/* GARAGE */
.car-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.car-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:10px;cursor:pointer;text-align:center;transition:border-color .15s;}
.car-card:hover:not(.locked){border-color:var(--border2);}
.car-card.sel{border-color:var(--green);background:var(--bg3);}
.car-card.locked{opacity:.4;cursor:default;}
.car-nm{font-size:11px;font-weight:600;color:var(--text2);margin:4px 0 2px;}
.car-sub{font-size:9px;color:var(--text3);}
.mbar{height:3px;background:var(--bg);border-radius:2px;margin:2px 0;overflow:hidden;}
.mfill{height:100%;border-radius:2px;}
.lock-t{font-size:9px;color:var(--text3);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1px 6px;margin-top:3px;display:inline-block;}
.circ-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:12px;}
.circ-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;padding:9px 11px;cursor:pointer;transition:border-color .15s;}
.circ-card:hover{border-color:var(--border2);}
.circ-card.done{border-color:var(--green);}
.circ-num{font-size:9px;color:var(--text3);margin-bottom:2px;}
.circ-nm{font-size:12px;font-weight:600;margin-bottom:1px;}
.circ-co{font-size:10px;color:var(--text3);}
.cbadge{display:inline-block;font-size:9px;border-radius:8px;padding:1px 7px;margin-top:3px;}
.cb-done{background:#1a4a1a;color:var(--green2);border:1px solid var(--green);}
.cb-todo{background:var(--bg);color:var(--text3);border:1px solid var(--border);}
.btn-go{display:block;width:100%;padding:11px;background:var(--bg3);border:1.5px solid var(--green);border-radius:10px;color:var(--green3);font-size:14px;font-weight:600;cursor:pointer;}
.btn-go:hover{background:var(--bg4);}

/* RACE SCREEN */
#screen-race{display:none;flex-direction:column;flex:1;overflow:hidden;}
#screen-race.active{display:flex;}
#track-wrap{position:relative;background:#1a3a1a;flex-shrink:0;}
#rc{display:block;width:100%;}
#race-hud{display:flex;align-items:center;gap:7px;padding:5px 10px;background:#060e06;border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.rhi{display:flex;align-items:center;gap:3px;font-size:11px;}
.rhl{color:var(--text3);}.rhv{font-weight:600;color:var(--text2);}
#pg-row{display:flex;align-items:center;gap:7px;padding:4px 10px;background:var(--bg);flex-shrink:0;}
.pg-out{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
.pg-in{height:100%;background:var(--green);border-radius:3px;transition:width .3s;}
#overlays{flex-shrink:0;overflow-y:auto;max-height:42vh;}

/* BILLBOARD */
#bb-panel,#ex-panel{display:none;padding:10px 12px;border-top:2px solid;}
#bb-panel{border-color:var(--green);background:var(--bg2);}
#ex-panel{border-color:var(--amber);background:var(--bg2);}
#bb-panel.vis,#ex-panel.vis{display:block;}
.ov-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.ov-t{font-size:13px;font-weight:600;color:var(--text2);}
.ov-cont{background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:3px 12px;font-size:11px;color:var(--green2);cursor:pointer;}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ov-th{font-size:12px;color:var(--text);line-height:1.6;}
.ov-th b{color:var(--text2);}
.ov-th ul{padding-left:14px;margin-top:3px;}
.ov-th li{margin-bottom:2px;}
.cbox{background:#040a04;border:1px solid var(--border);border-radius:7px;padding:9px;font-family:var(--font-mono);font-size:11px;color:var(--text);line-height:1.7;}
.kw{color:var(--blue);}.st{color:var(--green2);}.nm{color:var(--amber);}.cm{color:var(--text3);}.fn{color:var(--purple);}
.ex-q{font-size:13px;font-weight:600;color:#f4e0b0;margin-bottom:5px;line-height:1.4;}
.ex-ht{font-size:11px;color:#8a6040;margin-bottom:7px;}
.opts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px;}
.opt{background:var(--bg);border:1.5px solid var(--border);border-radius:7px;padding:5px 13px;font-size:12px;color:var(--text);cursor:pointer;font-family:var(--font-mono);}
.opt:hover{border-color:var(--border2);}
.opt.sel{border-color:var(--green);color:var(--green3);}
.opt.cor{background:#1a4a1a;border-color:var(--green);color:var(--green3);}
.opt.wrg{background:#2a1010;border-color:var(--red2);color:var(--red);}
.fb{font-size:12px;border-radius:7px;padding:7px 10px;margin-top:5px;display:none;line-height:1.4;}
.fb.ok{display:block;background:#1a4a1a;border:1px solid var(--green);color:var(--green3);}
.fb.err{display:block;background:#2a1010;border:1px solid #7a3a3a;color:var(--red);}
.ex-btns{display:flex;gap:7px;margin-top:4px;}
.btn-ver{background:var(--bg3);border:1.5px solid var(--green);border-radius:7px;padding:6px 18px;font-size:12px;font-weight:600;color:var(--green3);cursor:pointer;}
.btn-ver:hover{background:var(--bg4);}
.btn-sk{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:11px;color:var(--text3);cursor:pointer;}

/* EDITOR */
.mis-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:10px;}
.mis-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:9px;padding:9px;cursor:pointer;}
.mis-card:hover{border-color:var(--border2);}
.mis-card.am{border-color:var(--green);}
.mn{font-size:9px;color:var(--text3);margin-bottom:2px;}
.mt{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:2px;}
.md{font-size:10px;color:var(--text3);line-height:1.35;}
.mx{font-size:9px;color:var(--amber);margin-top:3px;}
.ed-wrap{display:grid;grid-template-columns:1fr 1fr;gap:9px;min-height:260px;}
.ep{background:#040a04;border:1px solid var(--border);border-radius:9px;overflow:hidden;display:flex;flex-direction:column;}
.ep-hd{display:flex;align-items:center;gap:5px;padding:5px 9px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:11px;color:var(--text3);flex-shrink:0;}
.dot3{display:flex;gap:3px;}.dot{width:7px;height:7px;border-radius:50%;}
textarea#cta{flex:1;width:100%;background:#040a04;border:none;outline:none;resize:none;font-family:var(--font-mono);font-size:12px;color:var(--green2);padding:9px;line-height:1.7;caret-color:var(--green3);}
#obox{padding:9px;font-family:var(--font-mono);font-size:11px;color:var(--text);line-height:1.7;flex:1;white-space:pre-wrap;word-break:break-all;overflow-y:auto;}
#obox.err{color:var(--red);}
.ed-btns{display:flex;gap:7px;margin-top:9px;align-items:center;flex-wrap:wrap;}
#hint-box{margin-top:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:12px;display:none;}

/* RANKING */
.rank-wrap{overflow-x:auto;}
table.rt{width:100%;border-collapse:collapse;}
.rt th{font-size:10px;color:var(--text3);font-weight:500;padding:5px 9px;text-align:left;border-bottom:1px solid var(--border);}
.rt td{font-size:12px;padding:6px 9px;border-bottom:1px solid var(--bg3);color:var(--text);}
.rt tr.me td{color:var(--green3);background:var(--bg3);}
.rxp{color:var(--amber2);font-weight:600;}.rlv{color:var(--blue);}.rst{color:var(--amber);}
.daily-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.dc{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px;}
.dt{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:2px;}
.dd{font-size:10px;color:var(--text3);margin-bottom:5px;line-height:1.35;}
.dpb{height:4px;background:var(--bg);border-radius:2px;margin-bottom:3px;overflow:hidden;}
.dpf{height:100%;border-radius:2px;}
.dx{font-size:10px;color:var(--amber);}

/* TROPHIES */
.tr-g{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.tr-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.tr-card.earned{border-color:var(--amber);}
.tr-card.locked-t .ti{filter:grayscale(1);opacity:.3;}
.ti{font-size:26px;margin-bottom:5px;}
.tnm{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:2px;}
.tds{font-size:10px;color:var(--text3);}

/* MODAL */
#modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:center;justify-content:center;}
#modal-wrap.open{display:flex;}
#modal{background:var(--bg2);border:1.5px solid var(--green);border-radius:14px;padding:22px;max-width:440px;width:90%;text-align:center;}
#modal h2{font-size:19px;color:var(--text2);margin-bottom:7px;}
#modal p{font-size:13px;color:var(--text);margin-bottom:14px;line-height:1.5;}
.mic{font-size:36px;margin-bottom:10px;}
</style>
</head>
<body>
<div id="app">

<div id="nav">
  <button class="nav-btn active" onclick="go('garage')">🏠 Garaje</button>
  <button class="nav-btn" onclick="go('race')">🏁 Carrera</button>
  <button class="nav-btn" onclick="go('editor')">💻 Editor</button>
  <button class="nav-btn" onclick="go('ranking')">🏆 Ranking</button>
  <button class="nav-btn" onclick="go('trophy')">🎖️ Logros</button>
  <div class="nav-sp"></div>
  <div class="hud">
    <span class="hud-lv" id="hlv">Nv 1</span>
    <div class="hud-sep"></div>
    <span style="color:var(--text3);font-size:11px">XP</span>
    <span style="color:var(--amber2);font-weight:600;font-size:12px" id="hxp">0</span>
    <div class="hud-sep"></div>
    <span style="color:var(--amber);font-size:12px" id="hco">🪙 0</span>
    <div class="hud-sep"></div>
    <span style="color:var(--amber);font-size:11px" id="hst">🔥 0d</span>
  </div>
</div>

<!-- GARAGE -->
<div class="screen active" id="screen-garage">
<div class="si">
  <div class="sec">🚗 Mi garaje</div>
  <div class="car-grid" id="car-grid"></div>
  <div class="sec">🗺️ Circuitos disponibles</div>
  <div class="circ-grid" id="circ-grid"></div>
  <button class="btn-go" onclick="go('race');startRace()">▶ Iniciar carrera</button>
</div>
</div>

<!-- RACE -->
<div class="screen" id="screen-race">
<div id="track-wrap"><canvas id="rc"></canvas></div>
<div id="race-hud">
  <div class="rhi"><span class="rhl">Circuito</span><span class="rhv" id="rh-ci">—</span></div>
  <div class="hud-sep"></div>
  <div class="rhi"><span class="rhl">Pos</span><span class="rhv" id="rh-po">—</span></div>
  <div class="hud-sep"></div>
  <div class="rhi"><span class="rhl">Vuelta</span><span class="rhv" id="rh-lp">1/3</span></div>
  <div class="hud-sep"></div>
  <div class="rhi"><span class="rhv" style="color:var(--amber2)" id="rh-sp">—</span></div>
  <div class="hud-sep"></div>
  <div class="rhi" id="rh-st" style="color:var(--green)">Listo</div>
  <div class="nav-sp"></div>
  <button onclick="stopRace();go('garage')" style="background:#1a0808;border:1px solid #5a1a1a;border-radius:6px;padding:3px 10px;font-size:11px;color:#cc6060;cursor:pointer;">Abandonar</button>
</div>
<div id="pg-row">
  <span style="font-size:10px;color:var(--text3);min-width:55px" id="pg-pct">0%</span>
  <div class="pg-out"><div class="pg-in" id="pg-in" style="width:0%"></div></div>
  <span style="font-size:10px;color:var(--text3);min-width:110px;text-align:right" id="pg-nx">—</span>
</div>
<div id="overlays">
  <div id="bb-panel">
    <div class="ov-hd">
      <div class="ov-t">📋 <span id="bb-ti">—</span></div>
      <button class="ov-cont" onclick="closeOv()">▶ Continuar carrera</button>
    </div>
    <div class="ov-grid">
      <div class="ov-th" id="bb-th"></div>
      <div class="cbox" id="bb-co"></div>
    </div>
  </div>
  <div id="ex-panel">
    <div class="ov-hd">
      <div class="ov-t" style="color:var(--amber)">⚡ <span id="ex-ti">—</span></div>
      <button class="btn-sk" onclick="skipEx()">Saltar (−10 XP)</button>
    </div>
    <div class="ex-q" id="ex-q"></div>
    <div class="ex-ht" id="ex-ht"></div>
    <div class="cbox" id="ex-co" style="margin-bottom:7px;"></div>
    <div class="opts" id="ex-opts"></div>
    <div class="ex-btns">
      <button class="btn-ver" onclick="checkAns()">✓ Verificar</button>
      <button class="btn-sk" onclick="skipEx()">Continuar sin resolver</button>
    </div>
    <div class="fb" id="fb-ok"></div>
    <div class="fb" id="fb-err"></div>
  </div>
</div>
</div>

<!-- EDITOR -->
<div class="screen" id="screen-editor">
<div class="si">
  <div class="sec">💻 Misiones de código Python</div>
  <div class="mis-grid" id="mis-grid"></div>
  <div class="ed-wrap">
    <div class="ep">
      <div class="ep-hd">
        <div class="dot3"><div class="dot" style="background:#cc4444"></div><div class="dot" style="background:var(--amber)"></div><div class="dot" style="background:var(--green)"></div></div>
        <span>mi_codigo.py</span>
        <span style="margin-left:auto;font-size:10px" id="ed-lbl">—</span>
      </div>
      <textarea id="cta" spellcheck="false"></textarea>
    </div>
    <div class="ep">
      <div class="ep-hd"><span>▶ Salida</span><span style="margin-left:auto;font-size:10px" id="ed-st"></span></div>
      <div id="obox">Presiona Ejecutar...</div>
    </div>
  </div>
  <div class="ed-btns">
    <button class="btn-ver" onclick="runCode()">▶ Ejecutar</button>
    <button class="btn-sk" onclick="clearEd()">Limpiar</button>
    <button class="btn-sk" onclick="showHint()">💡 Pista</button>
  </div>
  <div id="hint-box"></div>
</div>
</div>

<!-- RANKING -->
<div class="screen" id="screen-ranking">
<div class="si">
  <div class="sec">🏆 Ranking del curso</div>
  <div class="rank-wrap"><table class="rt"><thead><tr><th>Pos</th><th>Piloto</th><th>XP</th><th>Nv</th><th>Victorias</th><th>Racha</th></tr></thead><tbody id="rank-body"></tbody></table></div>
  <div class="sec" style="margin-top:14px;">📅 Misiones del día</div>
  <div class="daily-g" id="daily-g"></div>
</div>
</div>

<!-- TROPHIES -->
<div class="screen" id="screen-trophy">
<div class="si">
  <div class="sec">🎖️ Mis logros</div>
  <div class="tr-g" id="tr-g"></div>
</div>
</div>

</div><!-- end app -->

<div id="modal-wrap">
<div id="modal">
  <div class="mic" id="mic">🏆</div>
  <h2 id="mti">—</h2>
  <p id="mms">—</p>
  <button class="btn-ver" onclick="closeModal()">¡Continuar!</button>
</div>
</div>

<script>
// ===================== DATOS =====================
const CARS=[
  {id:0,name:'Turbo Python',color:'#5bc8f5',acc:'#a8e8ff',spd:6,ac:6,locked:false,xpR:0,desc:'Auto de inicio'},
  {id:1,name:'Shadow GT',color:'#cc4444',acc:'#f09090',spd:7,ac:7,locked:true,xpR:300,desc:'Motor agresivo'},
  {id:2,name:'Rocket R1',color:'#ffd166',acc:'#fff0a0',spd:8,ac:8,locked:true,xpR:800,desc:'Pura velocidad'},
  {id:3,name:'Ghost 404',color:'#c9a0ff',acc:'#e8d8ff',spd:9,ac:8,locked:true,xpR:1800,desc:'Auto misterioso'},
  {id:4,name:'ByteBreaker',color:'#f4a261',acc:'#ffe0c0',spd:9,ac:9,locked:true,xpR:3500,desc:'Ex-auto del villano'},
  {id:5,name:'Code Legend',color:'#85e89d',acc:'#c8f8d0',spd:10,ac:10,locked:true,xpR:6000,desc:'Solo para campeones'},
];
const CIRCS=[
  {id:0,name:'Pista de Combustible',concept:'Variables & tipos',color:'#79b8ff'},
  {id:1,name:'Curvas de Decisión',concept:'Condicionales if/elif/else',color:'#85e89d'},
  {id:2,name:'Vueltas Infinitas',concept:'Bucles for & while',color:'#c9a0ff'},
  {id:3,name:'Motor Turbo',concept:'Funciones & parámetros',color:'#f4a261'},
  {id:4,name:'El Garaje',concept:'Listas & métodos',color:'#f78fb3'},
  {id:5,name:'Stats del Corredor',concept:'Diccionarios',color:'#5dcaa5'},
  {id:6,name:'Taller de Reparación',concept:'Try / Except',color:'#ffd166'},
  {id:7,name:'Gran Premio Final',concept:'Proyecto integrado',color:'#e0a0ff'},
];
const BB=[
  [{title:'Variables — cajones de datos',th:'<b>Una variable</b> guarda información con un nombre.<br><br><b>Tipos:</b><ul><li><b>int</b> — enteros: velocidad = 120</li><li><b>float</b> — decimales: 99.5</li><li><b>str</b> — texto: "Turbo Py"</li><li><b>bool</b> — True / False</li></ul>',co:'<span class="cm"># Tu auto</span>\nvelocidad = <span class="nm">120</span>\ncombustible = <span class="nm">99.5</span>\nnombre = <span class="st">"Turbo Python"</span>\nactivo = <span class="kw">True</span>\n<span class="kw">print</span>(nombre, velocidad)'},

const SK='cr_save';
let S={xp:0,coins:0,level:1,streak:0,lastDay:'',selCar:0,selCirc:0,
       cars:[true,false,false,false,false,false],
       circs:[false,false,false,false,false,false,false,false],
       edDone:[false,false,false,false,false,false,false,false],
       trophies:[],wins:0,exOk:0,
       daily:{ex:0,open:0,race:0,day:''}};
function save(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}
function load(){
  try{const d=localStorage.getItem(SK);if(d)S=Object.assign(S,JSON.parse(d));}catch(e){}
  const today=new Date().toDateString();
  if(S.lastDay!==today){
    if(S.lastDay){const diff=Math.round((new Date(today)-new Date(S.lastDay))/86400000);S.streak=diff===1?S.streak+1:1;}
    else S.streak=1;
    S.lastDay=today;
  }
  if(S.daily.day!==today) S.daily={ex:0,open:1,race:0,day:today};
  else S.daily.open=1;
  save();updHUD();
}
function updHUD(){
  document.getElementById('hxp').textContent=S.xp.toLocaleString();
  document.getElementById('hco').textContent='🪙 '+S.coins;
  document.getElementById('hlv').textContent='Nv '+S.level;
  document.getElementById('hst').textContent='🔥 '+S.streak+'d';
}
function addXP(n,silent){
  S.xp+=n; S.coins+=Math.max(0,Math.floor(n/5));
  const nl=Math.floor(S.xp/400)+1;
  const lv=nl>S.level;S.level=nl;
  CARS.forEach((c,i)=>{if(!S.cars[i]&&S.xp>=c.xpR)S.cars[i]=true;});
  updHUD();save();
  if(lv&&!silent)modal('⬆️','¡Subiste de nivel!','Ahora eres Nivel '+S.level+'.');
  checkTrophies();
}

  document.querySelectorAll('.screen').forEach(s=>{s.classList.remove('active');s.style.display='none';});
  const el=document.getElementById('screen-'+name);
  if(!el)return;
  if(name==='race'){el.style.display='flex';el.classList.add('active');}
  else{el.style.display='block';el.classList.add('active');}
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const idx={garage:0,race:1,editor:2,ranking:3,trophy:4}[name];
  if(idx!=null)document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if(name==='garage')buildGarage();
  if(name==='editor'){buildMis();loadMis(curMis);}
  if(name==='ranking')buildRanking();
  if(name==='trophy')buildTrophies();
}

// ===================== GARAGE =====================
function buildGarage(){
  const g=document.getElementById('car-grid');g.innerHTML='';
  CARS.forEach((car,i)=>{
    const un=S.cars[i];
    const d=document.createElement('div');
    d.className='car-card'+(i===S.selCar?' sel':'')+(un?'':' locked');
    const cv=document.createElement('canvas');cv.width=110;cv.height=50;cv.className='car-canvas';
    d.appendChild(cv);
    d.innerHTML+=`<div class="car-nm">${car.name}</div><div class="car-sub">${car.desc}</div>`;
    d.innerHTML+=`<div style="font-size:9px;color:var(--text3);margin-top:2px">Vel</div><div class="mbar"><div class="mfill" style="width:${car.spd*10}%;background:var(--blue)"></div></div>`;
    d.innerHTML+=`<div style="font-size:9px;color:var(--text3)">Acel</div><div class="mbar"><div class="mfill" style="width:${car.ac*10}%;background:var(--green)"></div></div>`;
    if(!un)d.innerHTML+=`<span class="lock-t">🔒 ${car.xpR.toLocaleString()} XP</span>`;
    if(un)d.onclick=()=>{S.selCar=i;save();buildGarage();};
    g.appendChild(d);drawCarCV(cv,car,un);
  });
  const cg=document.getElementById('circ-grid');cg.innerHTML='';
  CIRCS.forEach((c,i)=>{
    const done=S.circs[i];
    const d=document.createElement('div');
    d.className='circ-card'+(done?' done':'');
    d.innerHTML=`<div class="circ-num">Circuito 0${i+1}</div><div class="circ-nm" style="color:${c.color}">${c.name}</div><div class="circ-co">${c.concept}</div><span class="cbadge ${done?'cb-done':'cb-todo'}">${done?'✓ Completado':'Disponible'}</span>`;
    d.onclick=()=>{S.selCirc=i;save();buildGarage();go('race');startRace();};
    cg.appendChild(d);
  });
}
function drawCarCV(cv,car,un){
  const ctx=cv.getContext('2d'),W=110,H=50,cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=car.color;ctx.beginPath();ctx.roundRect(cx-24,cy-9,48,18,5);ctx.fill();
  ctx.fillStyle=car.acc;ctx.beginPath();ctx.roundRect(cx-14,cy-15,28,12,3);ctx.fill();
  ctx.fillStyle='#1a1a2a';
  [[-14,10],[12,10]].forEach(([wx,wy])=>{ctx.beginPath();ctx.ellipse(cx+wx,cy+wy,6,4,0,0,Math.PI*2);ctx.fill();});
  if(!un){ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);ctx.font='16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🔒',cx,cy);}
}

// ===================== RACE ENGINE =====================
// Track is a closed loop of bezier control points
// We use a polyline and interpolate t in [0,1)
const TW=680, TH=380;
// Track path (closed loop, normalized for 680x380 canvas)
const TP=[
  {x:80,y:320},{x:180,y:320},{x:280,y:320},{x:380,y:320},{x:480,y:320},
  {x:570,y:320},{x:620,y:280},{x:630,y:230},{x:615,y:180},
  {x:570,y:150},{x:500,y:140},{x:430,y:140},{x:380,y:110},
  {x:370,y:70},{x:340,y:40},{x:290,y:30},{x:240,y:30},
  {x:190,y:40},{x:160,y:70},{x:150,y:110},
  {x:140,y:140},{x:90,y:150},{x:50,y:180},
  {x:40,y:230},{x:50,y:280},{x:80,y:320}
];
const TLEN=TP.length;

function tPos(t){
  // t in [0,1), maps to track
  const raw=((t%1)+1)%1;
  const fi=raw*(TLEN-1);
  const i=Math.floor(fi)%(TLEN-1);
  const f=fi-Math.floor(fi);
  const a=TP[i], b=TP[(i+1)%(TLEN)];
  return{x:a.x+(b.x-a.x)*f, y:a.y+(b.y-a.y)*f};
}

// Angle between consecutive points
function tAngle(t){
  const p1=tPos(t);
  const p2=tPos(t+0.005);
  return Math.atan2(p2.y-p1.y, p2.x-p1.x);
}

let rCv=null,rCtx=null;
let rafId=null;
let rActive=false;
// player t and two bots
let pT=0, b1T=0.18, b2T=0.34;
let pSpeed=0;
let triggered=new Set();
let curCPs=[];
let selOpt_=null, curExId_=0;

function buildCPs(ci){
  return [
    {t:0.14, label:'Cartel 1', type:'bb', id:0, color:'#79b8ff'},
    {t:0.32, label:'Ejercicio 1', type:'ex', id:0, color:'#f4a261'},
    {t:0.52, label:'Cartel 2', type:'bb', id:1, color:'#85e89d'},
    {t:0.70, label:'Ejercicio 2', type:'ex', id:1, color:'#f4a261'},
    {t:0.88, label:'Bonus XP', type:'bonus', id:0, color:'#ffd166'},
  ];
}

function initRaceCanvas(){
  rCv=document.getElementById('rc');
  rCv.width=TW; rCv.height=TH;
  rCv.style.width='100%'; rCv.style.height='auto';
  rCtx=rCv.getContext('2d');
  // click on checkpoints
  rCv.onclick=function(e){
    const rect=rCv.getBoundingClientRect();
    const sx=TW/rect.width, sy=TH/rect.height;
    const mx=(e.clientX-rect.left)*sx, my=(e.clientY-rect.top)*sy;
    curCPs.forEach(cp=>{
      const p=tPos(cp.t);
      if(Math.hypot(mx-p.x,my-p.y)<22){
        if(cp.type==='bb') openBB(cp.id);
        else if(cp.type==='ex') openEx(cp.id);
      }
    });
  };
}

function startRace(){
  if(!rCv) initRaceCanvas();
  stopRace();
  const car=CARS[S.selCar];
  const circ=CIRCS[S.selCirc];
  curCPs=buildCPs(S.selCirc);
  pT=0; b1T=0.18; b2T=0.34;
  pSpeed=0.0020+car.spd*0.00015;
  triggered=new Set();
  rActive=true;
  selOpt_=null;
  closeAllOv();
  document.getElementById('rh-ci').textContent=circ.name;
  document.getElementById('rh-lp').textContent='1/3';
  document.getElementById('rh-st').textContent='En carrera';
  document.getElementById('rh-st').style.color='var(--green)';
  document.getElementById('pg-nx').textContent='Siguiente: Cartel 1';
  tick();
}

function stopRace(){
  rActive=false;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
}

let lastTime=0;
function tick(ts=0){
  if(!rActive){render();return;}
  const dt=Math.min(ts-lastTime,50);lastTime=ts;

  // move cars
  const car=CARS[S.selCar];
  const ps=pSpeed*(dt/16.67);
  pT=(pT+ps)%1;

  // bots slightly slower/faster
  b1T=(b1T+ps*0.92)%1;
  b2T=(b2T+ps*0.85)%1;

  const pct=Math.round(pT*100);
  document.getElementById('pg-in').style.width=pct+'%';
  document.getElementById('pg-pct').textContent=pct+'% completado';
  const spd=Math.round(70+car.spd*14+Math.sin(pT*20)*5);
  document.getElementById('rh-sp').textContent=spd+' km/h';

  // position
  const ahead=[b1T,b2T].filter(b=>b>pT).length;
  document.getElementById('rh-po').textContent=(ahead===0?'1°':ahead===1?'2°':'3°');

  // checkpoints
  curCPs.forEach(cp=>{
    const key=cp.t+'_'+cp.type;
    if(!triggered.has(key)&&Math.abs(pT-cp.t)<0.018){
      triggered.add(key);
      if(cp.type==='bb'){rActive=false;openBB(cp.id);}
      else if(cp.type==='ex'){rActive=false;openEx(cp.id);}
      else if(cp.type==='bonus'){addXP(30,true);modal('⭐','¡Bonus!','+30 XP en pista.');}
    }
  });

  // lap completion
  if(pT>0.97&&!triggered.has('lap_done')){
    triggered.add('lap_done');
    rActive=false;
    S.circs[S.selCirc]=true;S.wins++;
    if(S.daily.day===new Date().toDateString())S.daily.race=1;
    save();addXP(150);checkTrophies();
    document.getElementById('rh-st').textContent='¡Ganaste!';
    document.getElementById('rh-st').style.color='var(--amber2)';
    modal('🏆','¡Carrera completada!','Ganaste el '+CIRCS[S.selCirc].name+'. +150 XP. ¡El siguiente circuito te espera!');
  }

  render();
  rafId=requestAnimationFrame(tick);
}

function render(){
  if(!rCtx)return;
  const ctx=rCtx;
  ctx.clearRect(0,0,TW,TH);

  // grass
  ctx.fillStyle='#1c3a1c';ctx.fillRect(0,0,TW,TH);
  ctx.fillStyle='#1e441e';
  for(let i=0;i<100;i++)ctx.fillRect(i*19%TW,i*27%TH,2,3);

  // trees
  [[24,50],[656,50],[24,355],[656,355],[340,355],[510,355],[170,355],[136,18],[510,18],[656,175],[24,200]].forEach(([tx,ty])=>{
    ctx.fillStyle='#0d2a0d';ctx.beginPath();ctx.arc(tx,ty,11,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a4a1a';ctx.beginPath();ctx.arc(tx-2,ty-3,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#5a3820';ctx.fillRect(tx-2,ty+8,4,5);
  });

  // track border (curbs)
  ctx.save();
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(TP[0].x,TP[0].y);
  for(let i=1;i<TP.length;i++)ctx.lineTo(TP[i].x,TP[i].y);
  ctx.closePath();
  ctx.strokeStyle='#999';ctx.lineWidth=52;ctx.stroke();
  // alternating curb
  ctx.setLineDash([16,16]);
  ctx.strokeStyle='#cc3333';ctx.lineWidth=56;
  ctx.beginPath();ctx.moveTo(TP[0].x,TP[0].y);
  for(let i=1;i<TP.length;i++)ctx.lineTo(TP[i].x,TP[i].y);
  ctx.closePath();ctx.stroke();
  ctx.setLineDash([16,16]);ctx.lineDashOffset=16;
  ctx.strokeStyle='#fff';
  ctx.beginPath();ctx.moveTo(TP[0].x,TP[0].y);
  for(let i=1;i<TP.length;i++)ctx.lineTo(TP[i].x,TP[i].y);
  ctx.closePath();ctx.stroke();
  ctx.setLineDash([]);ctx.lineDashOffset=0;
  ctx.restore();

  // road surface
  ctx.save();
  ctx.beginPath();ctx.moveTo(TP[0].x,TP[0].y);
  for(let i=1;i<TP.length;i++)ctx.lineTo(TP[i].x,TP[i].y);
  ctx.closePath();
  ctx.strokeStyle='#4a5548';ctx.lineWidth=44;ctx.stroke();
  // lane dashes
  ctx.setLineDash([20,20]);
  ctx.strokeStyle='rgba(240,230,120,0.35)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(TP[0].x,TP[0].y);
  for(let i=1;i<TP.length;i++)ctx.lineTo(TP[i].x,TP[i].y);
  ctx.closePath();ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // finish line
  for(let r=0;r<4;r++)for(let c=0;c<2;c++){
    ctx.fillStyle=(r+c)%2===0?'#fff':'#111';
    ctx.fillRect(70+c*5,312+r*5,5,5);
  }
  ctx.fillStyle='#fff';ctx.font='bold 8px sans-serif';ctx.textAlign='start';
  ctx.fillText('META',82,313);

  // checkpoints
  curCPs.forEach(cp=>{
    const p=tPos(cp.t);
    ctx.beginPath();ctx.arc(p.x,p.y,15,0,Math.PI*2);
    ctx.fillStyle=cp.type==='bb'?'#0a1a3a':cp.type==='bonus'?'#2a2000':'#2a1000';
    ctx.fill();
    ctx.strokeStyle=cp.color;ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(cp.type==='bb'?'i':cp.type==='bonus'?'★':'!',p.x,p.y);
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='500 8px sans-serif';ctx.textBaseline='top';
    ctx.fillText(cp.label,p.x,p.y+17);
  });

  // draw bots
  drawCar(b2T,'#f4a261','#ffe0b0',false);
  drawCar(b1T,'#cc4444','#f09090',false);
  // draw player
  const car=CARS[S.selCar];
  drawCar(pT,car.color,car.acc,true);
}

function drawCar(t,color,acc,player){
  const ctx=rCtx;
  const p=tPos(t);
  const ang=tAngle(t);
  ctx.save();
  ctx.translate(p.x,p.y);
  ctx.rotate(ang);
  // body
  ctx.fillStyle=color;
  ctx.beginPath();ctx.roundRect(-13,-7,26,14,5);ctx.fill();
  // cabin
  ctx.fillStyle=acc;
  ctx.beginPath();ctx.roundRect(-7,-6,14,10,2);ctx.fill();
  // wheels
  ctx.fillStyle='#111';
  [[-9,7],[8,7],[-9,-7],[8,-7]].forEach(([wx,wy])=>{
    ctx.beginPath();ctx.ellipse(wx,wy,4,3,0,0,Math.PI*2);ctx.fill();
  });
  // headlights
  ctx.fillStyle='rgba(255,255,180,0.9)';
  ctx.beginPath();ctx.ellipse(13,4,3,2,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(13,-4,3,2,0,0,Math.PI*2);ctx.fill();
  // player glow
  if(player){
    ctx.strokeStyle='rgba(168,240,160,.6)';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(-15,-9,30,18,6);ctx.stroke();
  }
  ctx.restore();
}

// ===================== BILLBOARD / EXERCISE =====================
function openBB(id){
  const ci=S.selCirc;
  const b=(BB[ci]&&BB[ci][id])||BB[0][0];
  document.getElementById('bb-ti').textContent=b.title;
  document.getElementById('bb-th').innerHTML=b.th;
  document.getElementById('bb-co').innerHTML=b.co.replace(/\n/g,'<br>');
  document.getElementById('bb-panel').classList.add('vis');
  document.getElementById('ex-panel').classList.remove('vis');
  document.getElementById('overlays').scrollTop=0;
}
function openEx(id){
  const ci=S.selCirc;
  const arr=EX[ci]||EX[0];
  const ex=arr[Math.min(id,arr.length-1)];
  curExId_=id;selOpt_=null;
  document.getElementById('ex-ti').textContent=ex.title;
  document.getElementById('ex-q').textContent=ex.q;
  document.getElementById('ex-ht').textContent='💡 '+ex.ht;
  document.getElementById('ex-co').innerHTML=ex.co.replace(/\n/g,'<br>');
  const oc=document.getElementById('ex-opts');oc.innerHTML='';
  ex.opts.forEach((o,i)=>{
    const b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=()=>{selOpt_=i;document.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');};
    oc.appendChild(b);
  });
  document.getElementById('fb-ok').className='fb';
  document.getElementById('fb-err').className='fb';
  document.getElementById('ex-panel').classList.add('vis');
  document.getElementById('bb-panel').classList.remove('vis');
  document.getElementById('overlays').scrollTop=0;
}
function checkAns(){
  if(selOpt_===null)return;
  const ci=S.selCirc;
  const arr=EX[ci]||EX[0];
  const ex=arr[Math.min(curExId_,arr.length-1)];
  document.querySelectorAll('.opt').forEach((b,i)=>{
    if(i===ex.c)b.classList.add('cor');
    else if(i===selOpt_&&selOpt_!==ex.c)b.classList.add('wrg');
  });
  if(selOpt_===ex.c){
    document.getElementById('fb-ok').textContent=ex.ok;
    document.getElementById('fb-ok').className='fb ok';
    document.getElementById('fb-err').className='fb';
    addXP(50+ci*8);
    S.exOk++;
    if(S.daily.day===new Date().toDateString())S.daily.ex=Math.max(S.daily.ex||0,1);
    save();
    setTimeout(()=>{closeAllOv();rActive=true;rafId=requestAnimationFrame(tick);},1600);
  } else {
    document.getElementById('fb-err').textContent=ex.err;
    document.getElementById('fb-err').className='fb err';
    document.getElementById('fb-ok').className='fb';
  }
}
function skipEx(){addXP(-10,true);closeAllOv();rActive=true;rafId=requestAnimationFrame(tick);}
function closeOv(){closeAllOv();rActive=true;rafId=requestAnimationFrame(tick);}
function closeAllOv(){
  document.getElementById('bb-panel').classList.remove('vis');
  document.getElementById('ex-panel').classList.remove('vis');
}

// ===================== EDITOR =====================
let curMis=0;
function buildMis(){
  const g=document.getElementById('mis-grid');g.innerHTML='';
  EMIS.forEach((m,i)=>{
    const done=S.edDone[i];
    const d=document.createElement('div');
    d.className='mis-card'+(i===curMis?' am':'');
    d.innerHTML=`<div class="mn">Misión ${m.id+1} — ${CIRCS[i]?.name||''}</div><div class="mt">${m.title}</div><div class="md">${m.desc}</div><div class="${done?'mx':'mx'}" style="color:${done?'var(--green)':'var(--amber)'}">${done?'✓ Completada':'+'+m.xp+' XP'}</div>`;
    d.onclick=()=>{curMis=i;loadMis(i);buildMis();};
    g.appendChild(d);
  });
}
function loadMis(i){
  const m=EMIS[i];
  document.getElementById('cta').value=m.starter;
  document.getElementById('ed-lbl').textContent='Misión '+(m.id+1)+': '+m.title;
  document.getElementById('obox').textContent='Presiona Ejecutar...';
  document.getElementById('obox').className='';
  document.getElementById('ed-st').textContent='';
  document.getElementById('hint-box').style.display='none';
}
function runCode(){
  const code=document.getElementById('cta').value.trim();
  const obox=document.getElementById('obox');
  const st=document.getElementById('ed-st');
  const lines=[];
  const fp=(...a)=>lines.push(a.map(x=>typeof x==='object'?JSON.stringify(x):String(x)).join(' '));
  try{
    let js=code;
    // f-strings
    js=js.replace(/f"((?:[^"\\]|\\.)*)"/g,(_,t)=>'`'+t.replace(/\{([^}]+)\}/g,'${$1}')+'`');
    js=js.replace(/f'((?:[^'\\]|\\.)*)'/g,(_,t)=>'`'+t.replace(/\{([^}]+)\}/g,'${$1}')+'`');
    js=js.replace(/\bTrue\b/g,'true').replace(/\bFalse\b/g,'false').replace(/\bNone\b/g,'null');
    js=js.replace(/\bprint\s*\(/g,'fp(');
    js=js.replace(/\belif\b/g,'else if');
    js=js.replace(/\band\b/g,'&&').replace(/\bor\b/g,'||').replace(/\bnot\s+/g,'!');
    js=js.replace(/^(\s*)def\s+(\w+)\s*\(([^)]*)\)\s*:/mg,(_,ind,nm,pr)=>`${ind}function ${nm}(${pr}){`);
    js=js.replace(/^(\s*)for\s+(\w+)\s+in\s+range\((\d+)\s*,\s*(\d+)(?:\s*,\s*(\d+))?\)\s*:/mg,(_,ind,v,a,b,s)=>`${ind}for(let ${v}=${a};${v}<${b};${v}+=${s||1}){`);
    js=js.replace(/^(\s*)for\s+(\w+)\s+in\s+range\((\d+)\)\s*:/mg,(_,ind,v,n)=>`${ind}for(let ${v}=0;${v}<${n};${v}++){`);
    js=js.replace(/^(\s*)for\s+(\w+)\s*,\s*(\w+)\s+in\s+(\w+)\.items\(\)\s*:/mg,(_,ind,k,v,d)=>`${ind}for(let [${k},${v}] of Object.entries(${d})){`);
    js=js.replace(/^(\s*)for\s+(\w+)\s+in\s+(\w+)\s*:/mg,(_,ind,v,a)=>`${ind}for(let ${v} of ${a}){`);
    js=js.replace(/^(\s*)while\s+(.+)\s*:/mg,(_,ind,c)=>`${ind}while(${c}){`);
    js=js.replace(/^(\s*)if\s+(.+)\s*:/mg,(_,ind,c)=>`${ind}if(${c}){`);
    js=js.replace(/^(\s*)else\s+if\s+(.+)\s*:/mg,(_,ind,c)=>`${ind}} else if(${c}){`);
    js=js.replace(/^(\s*)else\s*:/mg,(_,ind)=>`${ind}} else {`);
    js=js.replace(/^(\s*)try\s*:/mg,(_,ind)=>`${ind}try{`);
    js=js.replace(/^(\s*)except\s+\w+\s*:/mg,(_,ind)=>`${ind}} catch(e){`);
    js=js.replace(/^(\s*)except\s*:/mg,(_,ind)=>`${ind}} catch(e){`);
    js=js.replace(/^(\s*)finally\s*:/mg,(_,ind)=>`${ind}} finally{`);
    js=js.replace(/\.append\(/g,'.push(');
    js=js.replace(/\blen\((\w+)\)/g,'($1.length)');
    js=js.replace(/\bint\(([^)]+)\)/g,'(parseInt($1,10)||0)');
    js=js.replace(/\bfloat\(([^)]+)\)/g,'parseFloat($1)');
    js=js.replace(/\bstr\(([^)]+)\)/g,'String($1)');
    // close unclosed braces
    let d=0;
    const jsl=js.split('\n');
    for(const l of jsl){d+=(l.match(/\{/g)||[]).length-(l.match(/\}/g)||[]).length;}
    for(let i=0;i<d;i++)js+='\n}';
    const fn=new Function('fp',js);
    fn(fp);
    obox.textContent=lines.join('\n')||'(sin salida visible)';
    obox.className='';
    st.textContent='✓ OK';st.style.color='var(--green)';
    if(lines.length>0&&!S.edDone[curMis]){
      S.edDone[curMis]=true;
      const xp=EMIS[curMis].xp;
      addXP(xp);
      modal('💻','¡Código ejecutado!','Tu código funcionó correctamente. +'+xp+' XP');
      checkTrophies();buildMis();
    }
  }catch(ex){
    const em={SyntaxError:'Error de sintaxis — revisa los dos puntos ":" y la indentación.',ReferenceError:'Variable no definida — ¿declaraste la variable antes de usarla?',TypeError:'Tipo incorrecto — revisa que estés usando el tipo correcto de dato.'};
    const e=Object.entries(em).find(([k])=>ex.name===k);
    obox.textContent=(e?e[1]:'Error: '+ex.message)+'\n\nRevisa tu código línea por línea.';
    obox.className='err';
    st.textContent='✗ Error';st.style.color='var(--red)';
  }
}
function clearEd(){document.getElementById('cta').value='';document.getElementById('obox').textContent='Presiona Ejecutar...';document.getElementById('obox').className='';document.getElementById('ed-st').textContent='';}
function showHint(){const b=document.getElementById('hint-box');b.style.display='block';b.innerHTML='<b style="color:var(--text2)">💡 Pista:</b> <span style="color:var(--text);font-family:var(--font-mono);font-size:11px">'+EMIS[curMis].hint+'</span>';}

// ===================== RANKING =====================
function buildRanking(){
  const me={name:'Tú 🏎️',xp:S.xp,lvl:S.level,wins:S.wins,streak:S.streak+'d'};
  const all=[...BOTS,me].sort((a,b)=>b.xp-a.xp);
  const tb=document.getElementById('rank-body');tb.innerHTML='';
  all.forEach((r,i)=>{
    const tr=document.createElement('tr');
    if(r.name.startsWith('Tú'))tr.className='me';
    const m=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
    tr.innerHTML=`<td>${m}</td><td>${r.name}</td><td class="rxp">${r.xp.toLocaleString()}</td><td class="rlv">${r.lvl}</td><td>${r.wins}</td><td class="rst">${r.streak}</td>`;
    tb.appendChild(tr);
  });
  const dg=document.getElementById('daily-g');dg.innerHTML='';
  const DM=[
    {icon:'⚡',title:'Velocista',desc:'Responde un ejercicio hoy',key:'ex',goal:1,xp:30},
    {icon:'🔥',title:'Racha activa',desc:'Abre el juego hoy',key:'open',goal:1,xp:20},
    {icon:'🏁',title:'Gran corredor',desc:'Termina una carrera',key:'race',goal:1,xp:80},
  ];
  DM.forEach(dm=>{
    const prog=Math.min(S.daily[dm.key]||0,dm.goal);
    const done=prog>=dm.goal;
    const d=document.createElement('div');d.className='dc';
    d.innerHTML=`<div style="font-size:18px;margin-bottom:3px">${dm.icon}</div><div class="dt">${dm.title}</div><div class="dd">${dm.desc}</div><div class="dpb"><div class="dpf" style="width:${prog/dm.goal*100}%;background:${done?'var(--green)':'var(--amber)'}"></div></div><div class="dx">+${dm.xp} XP${done?' ✓':''}</div>`;
    dg.appendChild(d);
  });
}

// ===================== TROPHIES =====================
function checkTrophies(){
  const earn=id=>{if(!S.trophies.includes(id)){S.trophies.push(id);save();const t=TROPHIES.find(x=>x.id===id);if(t)modal(t.icon,'¡Logro desbloqueado!','"'+t.name+'" — '+t.desc);}};
  if(S.wins>=1)earn('win1');
  if(S.exOk>=1)earn('ex1');
  ['c0','c1','c2','c3','c4','c5','c6','c7'].forEach((id,i)=>{if(S.circs[i])earn(id);});
  if(S.edDone.filter(Boolean).length>=5)earn('ed5');
  if(S.streak>=7)earn('s7');
}
function buildTrophies(){
  const g=document.getElementById('tr-g');g.innerHTML='';
  TROPHIES.forEach(t=>{
    const e=S.trophies.includes(t.id);
    const d=document.createElement('div');
    d.className='tr-card'+(e?' earned':' locked-t');
    d.innerHTML=`<div class="ti">${t.icon}</div><div class="tnm">${t.name}</div><div class="tds">${t.desc}</div>${e?'<div style="font-size:10px;color:var(--green);margin-top:3px">✓ Obtenido</div>':''}`;
    g.appendChild(d);
  });
}

// ===================== MODAL =====================
function modal(ic,ti,ms){
  document.getElementById('mic').textContent=ic;
  document.getElementById('mti').textContent=ti;
  document.getElementById('mms').textContent=ms;
  document.getElementById('modal-wrap').classList.add('open');
}
function closeModal(){document.getElementById('modal-wrap').classList.remove('open');}

// ===================== INIT =====================
load();
buildGarage();
initRaceCanvas();
render();
</script>
</body>
</html>
